# Per-script environment variable configuration for automated runs
# (smoke tests, pre-release checks, CI).
#
# "defaults" are applied to every script on top of the inherited environment.
# "overrides" selectively unset or replace vars for matching path patterns.
#
# Pattern convention (same as no_run.yaml):
#   - Patterns containing '/' do a substring match against the file path
#   - Patterns without '/' match the file stem exactly

defaults:
  PYAUTO_TEST_MODE: "2"              # 0=normal, 1=reduced iterations, 2=skip sampler (fastest)
  PYAUTO_WORKSPACE_SMALL_DATASETS: "1"  # Cap grids/masks to 15x15, reduce MGE gaussians
  PYAUTO_DISABLE_JAX: "1"              # Force use_jax=False, avoid JIT compilation overhead
  PYAUTO_FAST_PLOTS: "1"               # Skip tight_layout() + critical curve/caustic overlays
  JAX_ENABLE_X64: "True"               # Enable 64-bit precision in JAX
  NUMBA_CACHE_DIR: "/tmp/numba_cache"   # Writable cache dir for numba
  MPLCONFIGDIR: "/tmp/matplotlib"       # Writable config dir for matplotlib

overrides:
  # Aggregator / database / minimal-output scripts assert `len(agg) > 0`.
  # They need a real sampler run; PYAUTO_TEST_MODE=2 would bypass the
  # sampler and leave the aggregator empty, failing the assertion.
  - pattern: "database/directory/general"
    unset: [PYAUTO_TEST_MODE]
  - pattern: "database/directory/multi_analysis"
    unset: [PYAUTO_TEST_MODE]
  - pattern: "database/scrape/general"
    unset: [PYAUTO_TEST_MODE]
  - pattern: "database/scrape/multi_analysis"
    unset: [PYAUTO_TEST_MODE]
  - pattern: "features/minimal_output"
    unset: [PYAUTO_TEST_MODE]
  # Model assertion scripts define inequality constraints between parameters
  # (e.g. gaussian_0.centre > gaussian_1.centre). Bypass mode (TEST_MODE=2)
  # uses a midpoint unit vector so both parameters get identical values,
  # violating the assertion and raising FitException before the likelihood
  # is called. Run with no test mode (real sampler) instead — TEST_MODE=1
  # reduces iterations but can leave assertion-violating samples in the
  # posterior that then crash compute_latent_variables post-fit.
  - pattern: "features/assertion"
    unset: [PYAUTO_TEST_MODE]
